name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @berget-ai/ui typecheck

      - name: Build
        run: pnpm --filter @berget-ai/ui build

      - name: Build Storybook
        run: pnpm --filter storybook build

      - name: Setup Java for Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Keycloak Theme
        run: pnpm --filter keycloak-theme run build-keycloak-theme
