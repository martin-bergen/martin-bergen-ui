<!doctype html>
<html>
  <head>
    <title>Berget AI</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/berget-icon-black.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/berget-icon-white.svg"
      media="(prefers-color-scheme: dark)"
    />
    <script src="/early-color-scheme.js"></script>
    <script
      defer
      src="https://umami.berget.ai/script.js"
      data-website-id="5e13741c-8eec-41a0-81ba-c808976d808c"
      data-tag="keycloak"
      data-domains="keycloak.berget.ai"
      data-before-send="prefixHostname"
    ></script>
    <script>
      window.prefixHostname = function (type, payload) {
        if (!payload || typeof payload !== "object") {
          return payload;
        }
        if (typeof payload.url === "string") {
          const url = new URL(payload.url, window.location.href);
          return {
            ...payload,
            url: "/" + window.location.hostname + url.pathname + url.search,
          };
        }
        return payload;
      };
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
